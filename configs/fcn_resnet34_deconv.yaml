experiment:
  name: fcn_resnet34_deconv

model:
  backbone: resnet34
  pretrained: true
  num_classes: 5
  head_init_seed: 42
  upsampling: deconv

data:
  root: ./data
  year: "2012"
  task: five_class
  train_split: train
  val_split: val
  filter_foreground: true
  input_size: [320, 320]
  ignore_index: 255
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  augmentation:
    scale_range: [0.5, 2.0]
    horizontal_flip_probability: 0.5

train:
  epochs: 50
  batch_size: 8
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  momentum: 0.9
  amp: true

evaluation:
  batch_size: 8
  warmup_iterations: 10

runtime:
  device: auto
  seed: 42
  deterministic: true

output:
  root: ./outputs
